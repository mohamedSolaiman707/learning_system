<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Player | منصة الأكاديمية</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e63946;
            --dark-blue: #102a43;
            --light-bg: #f8fafc;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background-color: var(--light-bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #header {
            height: 80px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            z-index: 10;
            border-bottom: 1px solid #edf2f7;
        }

        .brand-section { display: flex; align-items: center; gap: 15px; }
        .logo-icon {
            width: 45px; height: 45px;
            background: linear-gradient(135deg, var(--dark-blue), #243b53);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: bold; font-size: 22px;
        }
        
        #session-title { color: var(--dark-blue); font-size: 20px; font-weight: 700; }

        .indicator {
            padding: 8px 20px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
        }
        .status-rec { background: var(--primary-red); color: white; }
        .status-view { background: #e2e8f0; color: var(--dark-blue); }

        #main-content {
            flex: 1;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* حاوية الفيديو للمشاهد */
        #video-player-container {
            display: none; /* مخفي افتراضياً */
            width: 100%;
            max-width: 1100px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            border: 8px solid white;
        }
        #video-player-container video { width: 100%; height: 100%; }

        /* حاوية الفيديو للتسجيل الحي */
        #video-grid {
            display: grid;
            gap: 25px;
            width: 100%;
            height: 100%;
            max-width: 1400px;
        }

        .participant-card {
            position: relative;
            background: #000;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.08);
            border: 6px solid white;
            aspect-ratio: 16 / 9;
        }
        .participant-card video { width: 100%; height: 100%; object-fit: cover; }

        .name-tag {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(16, 42, 67, 0.8);
            color: white; padding: 6px 18px; border-radius: 12px;
            font-size: 14px; font-weight: 600; backdrop-filter: blur(10px);
        }

        .grid-1 { grid-template-columns: 1fr; max-width: 900px; }
        .grid-multi { grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); }
    </style>
</head>
<body>
    <header id="header">
        <div class="brand-section">
            <div class="logo-icon">A</div>
            <div id="session-title">جاري تحميل المحتوى...</div>
        </div>
        <div id="status-badge" class="indicator status-view">
            <span>عرض المحاضرة</span>
        </div>
    </header>

    <main id="main-content">
        <!-- وضع المشاهد (للطالب) -->
        <div id="video-player-container">
            <video id="main-video" controls autoplay>
                <source id="video-source" src="" type="video/mp4">
                متصفحك لا يدعم تشغيل الفيديو.
            </video>
        </div>

        <!-- وضع التسجيل (للمصور) -->
        <div id="video-grid" class="grid-1"></div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video_url'); // رابط الفيديو الخام من R2
        const title = urlParams.get('title') || 'حصة مسجلة';
        const token = urlParams.get('access_token');

        document.getElementById('session-title').innerText = title;

        if (videoUrl) {
            // --- وضع المشاهد (Viewer Mode) ---
            document.getElementById('video-player-container').style.display = 'block';
            document.getElementById('video-grid').style.display = 'none';
            document.getElementById('video-source').src = videoUrl;
            document.getElementById('main-video').load();
            document.getElementById('status-badge').innerHTML = '<span>مشاهدة التسجيل</span>';
        } else if (token) {
            // --- وضع التسجيل (Recording Mode) ---
            document.getElementById('status-badge').classList.add('status-rec');
            document.getElementById('status-badge').innerHTML = '<div style="width:10px;height:10px;background:white;border-radius:50%"></div><span>تسجيل مباشر</span>';
            initRecording(token);
        }

        function updateLayout() {
            const grid = document.getElementById('video-grid');
            const count = document.querySelectorAll('.participant-card').length;
            grid.className = count <= 1 ? 'grid-1' : 'grid-multi';
        }

        async function initRecording(token) {
            const room = new LiveKitClient.Room();
            await room.connect('wss://learning-system-07wdu0v6.livekit.cloud', token);
            room.on('trackSubscribed', (track, participant) => {
                if (track.kind === 'video') {
                    let card = document.getElementById(`p-${participant.identity}`);
                    if (!card) {
                        card = document.createElement('div');
                        card.id = `p-${participant.identity}`;
                        card.className = 'participant-card';
                        card.innerHTML = `<div class="name-tag">${participant.name || 'مشارك'}</div>`;
                        document.getElementById('video-grid').appendChild(card);
                    }
                    card.appendChild(track.attach());
                    updateLayout();
                }
            });
            room.on('participantDisconnected', (p) => {
                document.getElementById(`p-${p.identity}`)?.remove();
                updateLayout();
            });
        }
    </script>
</body>
</html>
