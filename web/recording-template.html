<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Recording</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(30, 64, 175, 0.15) 0px, transparent 50%);
            overflow: hidden;
        }

        /* شريط علوي أنيق */
        #header {
            position: absolute; top: 0; left: 0; right: 0; height: 80px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px); z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-circle {
            width: 45px; height: 45px; background: var(--primary);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; color: white;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }

        #session-title { color: #f8fafc; font-size: 24px; font-weight: 700; }

        .recording-status {
            background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 6px 16px; border-radius: 100px; display: flex; align-items: center; gap: 8px;
        }
        .dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        .recording-status span { color: #f8fafc; font-size: 14px; font-weight: 600; }

        /* منطقة الفيديو */
        #video-grid {
            position: absolute; top: 80px; bottom: 0; left: 0; right: 0;
            display: grid; gap: 20px; padding: 30px;
            transition: all 0.5s ease;
        }

        .participant-card {
            position: relative; width: 100%; height: 100%;
            background: #1e293b; border-radius: 24px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .name-tag {
            position: absolute; bottom: 20px; right: 20px;
            background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px);
            color: white; padding: 6px 18px; border-radius: 12px;
            font-size: 15px; font-weight: 600; border: 1px solid rgba(255,255,255,0.1);
        }

        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div id="header">
    <div class="logo-area">
        <div class="logo-circle">E</div>
        <div id="session-title">جاري التحميل...</div>
    </div>
    <div class="recording-status">
        <div class="dot"></div>
        <span>محاضرة مسجلة</span>
    </div>
</div>

<div id="video-grid"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const title = urlParams.get('title') || 'حصة تعليمية';
    document.getElementById('session-title').innerText = title;

    function updateLayout(count) {
        const grid = document.getElementById('video-grid');
        if (count === 1) {
            grid.style.gridTemplateColumns = "1fr";
            grid.style.padding = "40px 15% 60px 15%"; // لجعل فيديو المعلم في المنتصف وبشكل كبير
        } else {
            let cols = count > 4 ? 3 : 2;
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.style.padding = "30px";
        }
    }

    async function init() {
        const token = urlParams.get('access_token');
        if (!token) return;

        const room = new LiveKitClient.Room();
        await room.connect('https://learning-system-07wdu0v6.livekit.cloud', token);

        const handleTrack = (track, participant) => {
            if (track.kind === 'video') {
                let card = document.getElementById(`p-${participant.identity}`);
                if (!card) {
                    card = document.createElement('div');
                    card.id = `p-${participant.identity}`;
                    card.className = 'participant-card';
                    card.innerHTML = `<div class="name-tag">${participant.name || 'طالب'}</div>`;
                    document.getElementById('video-grid').appendChild(card);
                    updateLayout(document.querySelectorAll('.participant-card').length);
                }
                const element = track.attach();
                card.appendChild(element);
            }
        };

        room.on('trackSubscribed', handleTrack);
        room.on('participantDisconnected', (p) => {
            document.getElementById(`p-${p.identity}`)?.remove();
            updateLayout(document.querySelectorAll('.participant-card').length);
        });
    }
    init();
</script>
</body>
</html>
