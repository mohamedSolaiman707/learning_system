<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Professional Recording UI</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e63946;
            --accent-blue: #007bff;
            --bg-app: #f1f5f9;
            --sidebar-width: 320px;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background-color: var(--bg-app); overflow: hidden; display: flex; flex-direction: column; }

        /* Header */
        #app-header {
            height: 60px; background: white; display: flex; align-items: center; 
            justify-content: space-between; padding: 0 25px; border-bottom: 1px solid #e2e8f0; z-index: 100;
        }
        #session-title { color: #102a43; font-size: 17px; font-weight: 700; }
        .recording-tag { color: var(--primary-red); display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 13px; }
        .blink { width: 10px; height: 10px; background: var(--primary-red); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* App Body Layout */
        #app-body { flex: 1; display: flex; overflow: hidden; }

        /* Sidebar (Right-side in RTL) */
        #sidebar {
            width: var(--sidebar-width); background: white; border-left: 1px solid #eee;
            display: flex; flex-direction: column; box-shadow: -2px 0 10px rgba(0,0,0,0.02);
        }
        .sidebar-header { padding: 15px; border-bottom: 1px solid #f1f5f9; font-weight: 700; color: var(--accent-blue); display: flex; gap: 10px; }
        #chat-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-bubble { background: #f8fafc; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.5; border-bottom-right-radius: 2px; }
        .msg-bubble b { color: var(--accent-blue); display: block; margin-bottom: 2px; font-size: 11px; }

        /* Main Content Stage */
        #content-center { flex: 1; display: flex; flex-direction: column; padding: 15px; gap: 15px; background: #f8fafc; }
        
        #view-stage {
            flex: 2; background: #000; border-radius: 25px; position: relative; 
            overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid white;
        }
        #screenshare-layer { position: absolute; width: 100%; height: 100%; z-index: 1; }
        #screenshare-layer video { width: 100%; height: 100%; object-fit: contain; }
        #whiteboard-layer { position: absolute; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #whiteboard-canvas { width: 100%; height: 100%; }

        /* Participants Grid */
        #participants-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px;
        }
        .p-card { background: #000; border-radius: 18px; overflow: hidden; aspect-ratio: 16/9; position: relative; border: 3px solid transparent; }
        .p-card.is-speaking { border-color: var(--accent-blue); transform: scale(1.02); transition: 0.3s; }
        .p-card video { width: 100%; height: 100%; object-fit: cover; }
        .p-name { position: absolute; bottom: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; padding: 3px 12px; border-radius: 8px; font-size: 11px; backdrop-filter: blur(5px); }
        .p-hand { position: absolute; top: 12px; left: 12px; background: #ff9800; color: white; width: 28px; height: 28px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); z-index: 10; }

        /* Bottom Control Bar */
        #toolbar {
            height: 75px; background: white; border-top: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center; gap: 15px;
        }
        .btn-circle { width: 45px; height: 45px; border-radius: 50%; background: #f1f5f9; display: flex; align-items: center; justify-content: center; font-size: 20px; color: #475569; border: 1px solid #e2e8f0; }
        .btn-circle.active { color: var(--accent-blue); background: #e0f2fe; border-color: #bae6fd; }
        .btn-circle.hangup { background: var(--primary-red); color: white; border: none; }

        /* Video Playback (For students viewing the final file) */
        #video-playback { display: none; position: fixed; inset: 0; background: black; z-index: 1000; }
        #video-playback video { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="video-playback"><video id="recorded-video" controls autoplay></video></div>

    <header id="app-header">
        <div id="session-title">أكاديمية التعليم الذكي</div>
        <div class="recording-tag"><div class="blink"></div><span>RECORDING LIVE</span></div>
    </header>

    <div id="app-body">
        <aside id="sidebar">
            <div class="sidebar-header">💬 المحادثة والأسئلة</div>
            <div id="chat-list">
                <div class="msg-bubble"><i>بدأ تسجيل الحصة الآن...</i></div>
            </div>
        </aside>

        <section id="content-center">
            <div id="view-stage">
                <div id="screenshare-layer"></div>
                <div id="whiteboard-layer"><canvas id="whiteboard-canvas"></canvas></div>
            </div>
            <div id="participants-grid"></div>
        </section>
    </div>

    <footer id="toolbar">
        <div class="btn-circle active">🎤</div>
        <div class="btn-circle active">📷</div>
        <div class="btn-circle">✋</div>
        <div class="btn-circle hangup">📞</div>
        <div class="btn-circle">💬</div>
        <div class="btn-circle">👥</div>
        <div class="btn-circle">🖊️</div>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const vUrl = params.get('video_url');
        const token = params.get('access_token');
        document.getElementById('session-title').innerText = params.get('title') || 'حصة تعليمية';

        if (vUrl) {
            document.getElementById('video-playback').style.display = 'block';
            document.getElementById('recorded-video').src = vUrl;
        } else if (token) {
            initLive(token);
        }

        const canvas = document.getElementById('whiteboard-canvas');
        const ctx = canvas.getContext('2d');

        async function initLive(t) {
            const room = new LiveKitClient.Room({ adaptiveStream: true, dynacast: true });
            
            room.on('trackSubscribed', (track, pub, p) => {
                if (track.kind === 'video') {
                    if (track.source === LiveKitClient.Track.Source.ScreenShare) {
                        const view = document.getElementById('screenshare-layer');
                        view.innerHTML = ''; view.appendChild(track.attach());
                        view.style.display = 'block';
                    } else {
                        addParticipant(p, track);
                    }
                }
            });

            room.on('trackUnsubscribed', (track, pub, p) => {
                if (track.source !== LiveKitClient.Track.Source.ScreenShare) {
                    document.getElementById(`p-${p.identity}`)?.remove();
                } else {
                    document.getElementById('screenshare-layer').style.display = 'none';
                }
            });

            room.on('activeSpeakersChanged', (s) => {
                document.querySelectorAll('.p-card').forEach(c => c.classList.remove('is-speaking'));
                s.forEach(sp => document.getElementById(`p-${sp.identity}`)?.classList.add('is-speaking'));
            });

            room.on('dataReceived', (payload, p) => {
                try {
                    const data = JSON.parse(new TextDecoder().decode(payload));
                    if (data.type === 'chat_message') addChat(data.user_name, data.content);
                    if (data.type === 'whiteboard_draw') handleDraw(data);
                    if (data.type === 'hand_raise') {
                        const hand = document.querySelector(`#p-${p.identity} .p-hand`);
                        if (hand) hand.style.display = data.value ? 'flex' : 'none';
                    }
                } catch(e) {}
            });

            await room.connect('wss://learning-system-07wdu0v6.livekit.cloud', t);
            canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        }

        function addParticipant(p, track) {
            let card = document.getElementById(`p-${p.identity}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `p-${p.identity}`; card.className = 'p-card';
                card.innerHTML = `<div class="p-hand">✋</div><div class="p-name">${p.name || 'طالب'}</div>`;
                document.getElementById('participants-grid').appendChild(card);
            }
            card.appendChild(track.attach());
        }

        function addChat(user, text) {
            const list = document.getElementById('chat-list');
            const div = document.createElement('div');
            div.className = 'msg-bubble'; div.innerHTML = `<b>${user}</b>${text}`;
            list.appendChild(div); list.scrollTop = list.scrollHeight;
        }

        function handleDraw(data) {
            if (!data.points) return;
            ctx.strokeStyle = `rgba(${(data.color >> 16) & 255}, ${(data.color >> 8) & 255}, ${data.color & 255}, 1)`;
            ctx.lineWidth = data.width || 3; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(data.points[0].x * canvas.width, data.points[0].y * canvas.height);
            data.points.forEach(p => ctx.lineTo(p.x * canvas.width, p.y * canvas.height));
            ctx.stroke();
        }
    </script>
</body>
</html>
