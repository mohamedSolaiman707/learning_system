<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Recording Template</title>
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #e63946;
            --dark-blue: #102a43;
            --light-bg: #f8fafc;
            --card-bg: #ffffff;
        }
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            background-color: var(--light-bg);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* الهيدر العلوي */
        #header {
            height: 75px;
            background: var(--card-bg);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .logo {
            width: 40px; height: 45px;
            background: var(--dark-blue);
            border-radius: 10px;
            color: white; display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-size: 20px;
        }
        #session-title { color: var(--dark-blue); font-size: 18px; font-weight: 700; }

        .status {
            background: var(--primary-red); color: white;
            padding: 6px 15px; border-radius: 8px;
            display: flex; align-items: center; gap: 8px; font-size: 13px;
        }
        .dot { width: 8px; height: 8px; background: white; border-radius: 50%; animation: pulse 1s infinite; }

        /* منطقة الفيديوهات - Responsive Grid */
        #content {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #video-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 15px;
            width: 100%;
            height: 100%;
        }

        .participant-card {
            position: relative;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border: 4px solid white;
            transition: all 0.3s ease;
            flex-grow: 0;
            flex-shrink: 1;
            aspect-ratio: 16 / 9;
        }

        /* أحجام ذكية بناءً على عدد الحضور */
        .size-full { width: 85%; max-height: 90%; }
        .size-half { width: calc(50% - 15px); }
        .size-multi { width: calc(33% - 15px); }

        video { width: 100%; height: 100%; object-fit: cover; }

        .name-label {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(16, 42, 67, 0.8);
            color: white; padding: 5px 15px; border-radius: 8px;
            font-size: 13px; backdrop-filter: blur(5px);
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div id="header">
    <div class="brand">
        <div class="logo">A</div>
        <div id="session-title">جاري تحميل الحصة...</div>
    </div>
    <div class="status">
        <div class="dot"></div>
        <span>تسجيل مباشر</span>
    </div>
</div>

<div id="content">
    <div id="video-grid"></div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const title = urlParams.get('title') || 'حصة تعليمية';
    document.getElementById('session-title').innerText = title;

    function refreshLayout() {
        const grid = document.getElementById('video-grid');
        const cards = document.querySelectorAll('.participant-card');
        const count = cards.length;

        cards.forEach(card => {
            card.classList.remove('size-full', 'size-half', 'size-multi');
            if (count <= 1) card.classList.add('size-full');
            else if (count === 2) card.classList.add('size-half');
            else card.classList.add('size-multi');
        });
    }

    async function init() {
        const token = urlParams.get('access_token');
        if (!token) return;

        const room = new LiveKitClient.Room();
        try {
            // تصحيح البروتوكول إلى wss:// للاتصال باللايف كيت
            await room.connect('wss://learning-system-07wdu0v6.livekit.cloud', token);

            room.on('trackSubscribed', (track, participant) => {
                if (track.kind === 'video') {
                    let card = document.getElementById(`p-${participant.identity}`);
                    if (!card) {
                        card = document.createElement('div');
                        card.id = `p-${participant.identity}`;
                        card.className = 'participant-card';
                        card.innerHTML = `<div class="name-label">${participant.name || 'مشارك'}</div>`;
                        document.getElementById('video-grid').appendChild(card);
                    }
                    card.appendChild(track.attach());
                    refreshLayout();
                }
            });

            room.on('participantDisconnected', (p) => {
                document.getElementById(`p-${p.identity}`)?.remove();
                refreshLayout();
            });
        } catch (e) {
            console.error("Connection failed", e);
        }
    }
    init();
</script>
</body>
</html>
