<!DOCTYPE html><html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiveKit Recording Template</title>
    <!-- استيراد مكتبة LiveKit -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #102a43 0%, #243b53 100%); /* لون الخلفية الاحترافي */
        }

        /* الهيدر العلوي */
        #header {
            position: absolute; top: 0; left: 0; right: 0; height: 70px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; background: rgba(0,0,0,0.3);
            backdrop-filter: blur(10px); color: white; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        #session-title { font-size: 22px; font-weight: bold; }
        #live-indicator { display: flex; align-items: center; color: #ff4b2b; font-weight: bold; }
        #rec-dot { width: 12px; height: 12px; background: #ff4b2b; border-radius: 50%; margin-left: 8px; animation: pulse 1s infinite; }

        /* منطقة الفيديو */
        #video-grid {
            position: absolute; top: 70px; bottom: 0; left: 0; right: 0;
            display: grid; gap: 15px; padding: 20px;
            justify-content: center; align-content: center;
        }

        .participant-container {
            position: relative; width: 100%; height: 100%;
            background: #000; border-radius: 15px; overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.1);
        }

        video { width: 100%; height: 100%; object-fit: cover; }

        .participant-name {
            position: absolute; bottom: 15px; right: 15px;
            background: rgba(0,0,0,0.6); color: white;
            padding: 5px 15px; border-radius: 8px; font-size: 14px;
        }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="header">
    <div id="session-title">جاري التحميل...</div>
    <div id="live-indicator">
        <div id="rec-dot"></div>
        <span>تسجيل مباشر</span>
    </div>
</div>

<div id="video-grid"></div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const roomName = urlParams.get('room');
    const title = urlParams.get('title') || 'حصة تعليمية';

    document.getElementById('session-title').innerText = title;

    // إعدادات الـ Grid التلقائي
    function updateLayout(count) {
        const grid = document.getElementById('video-grid');
        let cols = count > 4 ? 3 : (count > 1 ? 2 : 1);
        grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        grid.style.gridTemplateRows = `repeat(${Math.ceil(count/cols)}, 1fr)`;
    }

    async function init() {
        // LiveKit Recorder بيدخل الغرفة أوتوماتيكياً لو الرابط صح
        // ملاحظة: LiveKit بيمرر الـ token في الـ URL أحياناً للـ Recorder
        const token = urlParams.get('access_token');
        if (!token) return;

        const room = new LiveKitClient.Room();
        await room.connect('wss://learning-system-07wdu0v6.livekit.cloud', token);

        const handleTrack = (track, participant) => {
            if (track.kind === 'video') {
                let container = document.getElementById(`p-${participant.identity}`);
                if (!container) {
                    container = document.createElement('div');
                    container.id = `p-${participant.identity}`;
                    container.className = 'participant-container';
                    container.innerHTML = `<div class="participant-name">${participant.name || participant.identity}</div>`;
                    document.getElementById('video-grid').appendChild(container);
                    updateLayout(document.querySelectorAll('.participant-container').length);
                }
                const element = track.attach();
                container.appendChild(element);
            }
        };

        room.on('trackSubscribed', handleTrack);
        room.on('participantDisconnected', (p) => {
            document.getElementById(`p-${p.identity}`)?.remove();
            updateLayout(document.querySelectorAll('.participant-container').length);
        });
    }

    init();
</script>
</body>
</html>
